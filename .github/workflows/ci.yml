name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run typecheck
      - run: npm run cli -- validate
      - run: npm run cli -- lint
      - run: npm run registry:check
      - run: npm run evals
      - run: npm run docs:validate
      - run: npm run docs:links
      - run: npm run build
