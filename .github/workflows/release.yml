name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish npm packages
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - name: Publish @wzrdtech/core
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --workspace @wzrdtech/core --provenance --access public
      - name: Publish @wzrdtech/providers
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --workspace @wzrdtech/providers --provenance --access public
      - name: Publish @wzrdtech/zap
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --workspace @wzrdtech/zap --provenance --access public
