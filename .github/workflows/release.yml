name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish npm packages
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm publish --workspace @wzrdtech/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish --workspace @wzrdtech/providers --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish --workspace @wzrdtech/zap --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
