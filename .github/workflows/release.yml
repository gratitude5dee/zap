name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish npm packages
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - name: Check npm first-publish authorization
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          missing_packages=()
          for package_name in @wzrdtech/core @wzrdtech/providers; do
            if ! npm view "$package_name" version >/dev/null 2>&1; then
              missing_packages+=("$package_name")
            fi
          done

          if [ "${#missing_packages[@]}" -gt 0 ] && [ -z "$NPM_TOKEN" ]; then
            {
              echo "The following packages do not exist on npm yet: ${missing_packages[*]}."
              echo "First publication requires a GitHub Actions NPM_TOKEN with package creation rights for @wzrdtech."
              echo "After first publish, package-level trusted publishing can publish without a long-lived token."
            } >&2
            exit 1
          fi
      - name: Publish @wzrdtech/core
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --workspace @wzrdtech/core --provenance --access public
      - name: Publish @wzrdtech/providers
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --workspace @wzrdtech/providers --provenance --access public
      - name: Publish @wzrdtech/zap
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish --workspace @wzrdtech/zap --provenance --access public
